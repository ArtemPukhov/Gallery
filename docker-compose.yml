services:
  app:
    build:
      context: .
      args:
        FETCH_ARTISTS_SKIP: "1"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
