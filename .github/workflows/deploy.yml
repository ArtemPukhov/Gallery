name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.255.7.83
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_BUCKET
          script: |
            set -e
            REPO_DIR="/root/peredvizhniki-gallery"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Wait for MinIO
            docker run --rm --network host busybox sh -c 'for i in $(seq 1 60); do wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && exit 0; sleep 1; done; exit 1'

            # Write .env
            printf '%s\n' \
              "MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY" \
              "MINIO_SECRET_KEY=$MINIO_SECRET_KEY" \
              "MINIO_ROOT_USER=$MINIO_ACCESS_KEY" \
              "MINIO_ROOT_PASSWORD=$MINIO_SECRET_KEY" \
              "MINIO_ENDPOINT=http://127.0.0.1:9000" \
              "MINIO_BUCKET=$MINIO_BUCKET" \
              "MINIO_PUBLIC_BASE_URL=https://assets.peredvijniki-gallery.ru" \
              "MINIO_REGION=us-east-1" \
              "MINIO_FORCE_PATH_STYLE=1" \
              "FETCH_ARTISTS_UPLOAD_MINIO=1" \
              "FETCH_ARTISTS_DOWNLOAD_IMAGES=0" \
              > .env

            # Bucket setup
            docker run --rm --network host minio/mc alias set local http://127.0.0.1:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" --api s3v4
            docker run --rm --network host minio/mc mb -p local/$MINIO_BUCKET || true
            docker run --rm --network host minio/mc anonymous set download local/$MINIO_BUCKET

            # Fetch data and deploy
            docker run --rm --network host --env-file .env -v "$PWD:/app" -w /app node:20-alpine sh -lc "npm ci && npm run fetch:data"
            docker compose up -d --build
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
