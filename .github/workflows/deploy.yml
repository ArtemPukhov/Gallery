name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.255.7.83
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # Передаем переменные через envs, чтобы спецсимволы в паролях не ломали bash
          envs: MINIO_USER,MINIO_PASS,MINIO_BUCKET
        env:
          MINIO_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_PASS: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        with:
          script: |
            set -e
            REPO_DIR="/root/peredvizhniki-gallery"
            
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # 1. Ждем готовности MinIO
            docker run --rm --network host busybox sh -c 'until wget -qO- http://127.0.0.1:9000/minio/health/live; do sleep 1; done'

            # 2. Пишем .env с использованием кавычек для защиты паролей
            cat <<EOF > .env
            MINIO_ROOT_USER="$MINIO_USER"
            MINIO_ROOT_PASSWORD="$MINIO_PASS"
            MINIO_ENDPOINT=http://127.0.0.1:9000
            MINIO_ACCESS_KEY="$MINIO_USER"
            MINIO_SECRET_KEY="$MINIO_PASS"
            MINIO_BUCKET="$MINIO_BUCKET"
            MINIO_PUBLIC_BASE_URL=https://assets.peredvijniki-gallery.ru
            MINIO_REGION=us-east-1
            MINIO_FORCE_PATH_STYLE=1
            FETCH_ARTISTS_UPLOAD_MINIO=1
            FETCH_ARTISTS_DOWNLOAD_IMAGES=1
            EOF

            # 3. Настройка бакета (исправляем Access Denied)
            # Используем один контейнер mc для всех команд
            docker run --rm --network host minio/mc sh -c "
              mc alias set local http://127.0.0.1:9000 '$MINIO_USER' '$MINIO_PASS' --api s3v4
              if ! mc ls local/$MINIO_BUCKET > /dev/null 2>&1; then
                mc mb local/$MINIO_BUCKET
              fi
              mc anonymous set download local/$MINIO_BUCKET
            "

            # 4. Сборка данных (добавляем переменную для User-Agent, чтобы избежать 429)
            # ВАЖНО: убедитесь, что в вашем Node.js коде есть задержка между запросами
            docker run --rm --network host --env-file .env -v "$PWD:/app" -w /app node:20-alpine sh -lc "npm ci && npm run fetch:data"

            # 5. Запуск основного приложения
            docker compose up -d --build
