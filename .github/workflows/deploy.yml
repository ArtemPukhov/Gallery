name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.255.7.83
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_BUCKET,FETCH_ARTISTS_SKIP,FETCH_ARTISTS_MIN_DELAY_MS,FETCH_ARTISTS_MAX_DELAY_MS,FETCH_ARTISTS_JITTER_MS
          script: |
            set -e
            REPO_DIR="/root/peredvizhniki-gallery"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Wait for MinIO
            docker run --rm --network host busybox sh -c 'for i in $(seq 1 60); do wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && exit 0; sleep 1; done; exit 1'

            # Write .env
            printf '%s\n' \
              "MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY" \
              "MINIO_SECRET_KEY=$MINIO_SECRET_KEY" \
              "MINIO_ROOT_USER=$MINIO_ACCESS_KEY" \
              "MINIO_ROOT_PASSWORD=$MINIO_SECRET_KEY" \
              "MINIO_ENDPOINT=http://127.0.0.1:9000" \
              "MINIO_BUCKET=$MINIO_BUCKET" \
              "MINIO_PUBLIC_BASE_URL=https://assets.peredvijniki-gallery.ru" \
              "MINIO_REGION=us-east-1" \
              "MINIO_FORCE_PATH_STYLE=1" \
              "FETCH_ARTISTS_UPLOAD_MINIO=1" \
              "FETCH_ARTISTS_DOWNLOAD_IMAGES=0" \
              "FETCH_ARTISTS_SKIP=${FETCH_ARTISTS_SKIP:-1}" \
              "FETCH_ARTISTS_MIN_DELAY_MS=${FETCH_ARTISTS_MIN_DELAY_MS:-1000}" \
              "FETCH_ARTISTS_MAX_DELAY_MS=${FETCH_ARTISTS_MAX_DELAY_MS:-10000}" \
              "FETCH_ARTISTS_JITTER_MS=${FETCH_ARTISTS_JITTER_MS:-300}" \
              > .env

            # Bucket setup is skipped (assumed pre-created)

            # Fetch data and deploy
            docker run --rm --network host --env-file .env -v "$PWD:/app" -w /app node:20-alpine sh -lc "npm ci && npm run fetch:data"
            docker compose up -d --build
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          FETCH_ARTISTS_SKIP: "1"

  refresh-data:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Refresh data via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.255.7.83
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_BUCKET,FETCH_ARTISTS_SKIP,FETCH_ARTISTS_MIN_DELAY_MS,FETCH_ARTISTS_MAX_DELAY_MS,FETCH_ARTISTS_JITTER_MS
          script: |
            set -e
            REPO_DIR="/root/peredvizhniki-gallery"

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Wait for MinIO
            docker run --rm --network host busybox sh -c 'for i in $(seq 1 60); do wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 && exit 0; sleep 1; done; exit 1'

            # Write .env
            printf '%s\n' \
              "MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY" \
              "MINIO_SECRET_KEY=$MINIO_SECRET_KEY" \
              "MINIO_ROOT_USER=$MINIO_ACCESS_KEY" \
              "MINIO_ROOT_PASSWORD=$MINIO_SECRET_KEY" \
              "MINIO_ENDPOINT=http://127.0.0.1:9000" \
              "MINIO_BUCKET=$MINIO_BUCKET" \
              "MINIO_PUBLIC_BASE_URL=https://assets.peredvijniki-gallery.ru" \
              "MINIO_REGION=us-east-1" \
              "MINIO_FORCE_PATH_STYLE=1" \
              "FETCH_ARTISTS_UPLOAD_MINIO=1" \
              "FETCH_ARTISTS_DOWNLOAD_IMAGES=0" \
              "FETCH_ARTISTS_SKIP=${FETCH_ARTISTS_SKIP:-0}" \
              "FETCH_ARTISTS_MIN_DELAY_MS=${FETCH_ARTISTS_MIN_DELAY_MS:-1000}" \
              "FETCH_ARTISTS_MAX_DELAY_MS=${FETCH_ARTISTS_MAX_DELAY_MS:-10000}" \
              "FETCH_ARTISTS_JITTER_MS=${FETCH_ARTISTS_JITTER_MS:-300}" \
              > .env

            # Bucket setup is skipped (assumed pre-created)

            # Fetch data and deploy
            docker run --rm --network host --env-file .env -v "$PWD:/app" -w /app node:20-alpine sh -lc "npm ci && npm run fetch:data"
            docker compose up -d --build
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
