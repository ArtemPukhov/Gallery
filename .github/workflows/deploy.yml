name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 158.255.7.83
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            REPO_DIR="/root/peredvizhniki-gallery"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Write .env from GitHub secrets (overwrite to avoid stale values)
            printf '%s\n' \
              "MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}" \
              "MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}" \
              "MINIO_ENDPOINT=http://127.0.0.1:9002" \
              "MINIO_ACCESS_KEY=${{ secrets.MINIO_ROOT_USER }}" \
              "MINIO_SECRET_KEY=${{ secrets.MINIO_ROOT_PASSWORD }}" \
              "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}" \
              "MINIO_PUBLIC_BASE_URL=https://assets.peredvijniki-gallery.ru" \
              "MINIO_REGION=us-east-1" \
              "MINIO_FORCE_PATH_STYLE=1" \
              "FETCH_ARTISTS_UPLOAD_MINIO=1" \
              "FETCH_ARTISTS_DOWNLOAD_IMAGES=0" \
              > .env

            # Ensure MinIO is running
            docker compose up -d minio

            # Wait for MinIO to be ready
            docker run --rm --network host busybox sh -c 'for i in $(seq 1 30); do wget -qO- http://127.0.0.1:9002/minio/health/live >/dev/null 2>&1 && exit 0; sleep 1; done; exit 1'

            # Ensure bucket exists and is public
            docker run --rm --network host minio/mc alias set local http://127.0.0.1:9002 ${{ secrets.MINIO_ROOT_USER }} ${{ secrets.MINIO_ROOT_PASSWORD }}
            docker run --rm --network host minio/mc mb -p local/${{ secrets.MINIO_BUCKET }} || true
            docker run --rm --network host minio/mc anonymous set download local/${{ secrets.MINIO_BUCKET }}

            # Generate data and upload images to MinIO (uses .env on the server)
            docker run --rm --network host --env-file .env -v "$PWD:/app" -w /app node:20-alpine sh -lc "npm ci && npm run fetch:data"

            # Build and restart
            docker compose up -d --build
